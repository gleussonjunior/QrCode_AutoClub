<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoClub QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}

@media (max-width: 768px) {
    .container {
        grid-template-columns: 1fr;
    }
}

.panel {
    background: #1e293b;
    padding: 25px;
    border-radius: 16px;
}

h1 {
    margin-bottom: 15px;
}

label {
    font-size: 13px;
    font-weight: 600;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
}

button {
    width: 100%;
    padding: 14px;
    background: #f97316;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.preview {
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: black;
    padding: 35px 25px;
    border-radius: 24px;
    text-align: center;
    width: 100%;
    max-width: 360px;
}

.title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 20px;
}

.qr-box {
    background: white;
    padding: 20px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

#qrcode canvas {
    display: block;
}

.brand {
    margin-top: 18px;
    font-weight: 800;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

    <div class="panel">
        <h1>AutoClub QR</h1>

        <label>URL</label>
        <input id="url" value="https://www.autoclubgaragens.com.br/">

        <label>Garajeiro</label>
        <input id="garajeiro" placeholder="ex: branco-automoveis">

        <label>Tamanho</label>
        <select id="size">
            <option value="250">Pequeno (250px)</option>
            <option value="300" selected>Médio (300px)</option>
            <option value="400">Grande (400px)</option>
            <option value="500">Extra Grande (500px)</option>
        </select>

        <button onclick="downloadQR()">Gerar e baixar</button>
    </div>

    <div class="preview">
        <div class="card" id="qrCard">
            <div class="title">Conheça nosso estoque!</div>

            <div class="qr-box">
                <div id="qrcode"></div>
            </div>

            <div class="brand">AutoClub</div>
        </div>
    </div>

</div>

<script>

function normalizeSlug(text) {
    return text.toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9_-]/g, '');
}

function generateQR() {
    const url = document.getElementById('url').value;
    const garajeiroInput = document.getElementById('garajeiro');
    const size = parseInt(document.getElementById('size').value);

    let garajeiro = normalizeSlug(garajeiroInput.value);
    garajeiroInput.value = garajeiro;

    let finalUrl = url;

    if (garajeiro) {
        const sep = url.includes('?') ? '&' : '?';
        finalUrl = url + sep +
            'garajeiro=' + garajeiro +
            '&utm_source=qr&utm_medium=offline';
    }

    document.getElementById('qrcode').innerHTML = '';

    new QRCode(document.getElementById('qrcode'), {
        text: finalUrl,
        width: size,
        height: size
    });
}

function downloadQR() {
    generateQR();

    const card = document.getElementById('qrCard');

    html2canvas(card, {
        backgroundColor: null,
        scale: 3
    }).then(canvas => {
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = 'autoclub-qr.png';
        link.click();
    });
}

document.getElementById('url').addEventListener('input', generateQR);
document.getElementById('garajeiro').addEventListener('input', generateQR);
document.getElementById('size').addEventListener('change', generateQR);

generateQR();

</script>

</body>
</html>
