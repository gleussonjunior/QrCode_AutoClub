<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoClub QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}

@media (max-width: 768px) {
    .container {
        grid-template-columns: 1fr;
    }
}

.panel {
    background: #1e293b;
    padding: 25px;
    border-radius: 16px;
}

h1 {
    margin-bottom: 10px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
}

button {
    width: 100%;
    padding: 14px;
    background: #f97316;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.preview {
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: black;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
}

.card h2 {
    font-size: 20px;
    margin-bottom: 20px;
}

.qr-box {
    background: white;
    padding: 15px;
    border-radius: 15px;
    display: inline-block;
}

.brand {
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="panel">
        <h1>AutoClub QR</h1>

        <label>URL</label>
        <input id="url" value="https://autoclubgaragens.com.br">

        <label>Garajeiro</label>
        <input id="garajeiro" placeholder="ex: branco-automoveis">

        <label>Tamanho</label>
        <select id="size">
            <option value="250">250</option>
            <option value="300" selected>300</option>
            <option value="400">400</option>
        </select>

        <button onclick="downloadQR()">Gerar e baixar</button>
    </div>

    <div class="preview">
        <div class="card">
            <h2>🚗 Veja nosso estoque agora</h2>
            <div class="qr-box">
                <div id="qrcode"></div>
            </div>
            <div class="brand" id="brand">AutoClub</div>
        </div>
    </div>

</div>

<script>

function normalizeSlug(text) {
    return text.toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9_-]/g, '');
}

function generateQR() {
    const url = document.getElementById('url').value;
    const garajeiroInput = document.getElementById('garajeiro');
    let garajeiro = normalizeSlug(garajeiroInput.value);
    garajeiroInput.value = garajeiro;

    const size = parseInt(document.getElementById('size').value);

    let finalUrl = url;

    if (garajeiro) {
        const sep = url.includes('?') ? '&' : '?';
        finalUrl = url + sep +
            'garajeiro=' + garajeiro +
            '&utm_source=qr&utm_medium=offline';
    }

    document.getElementById('qrcode').innerHTML = '';

    new QRCode(document.getElementById('qrcode'), {
        text: finalUrl,
        width: size,
        height: size
    });

    document.getElementById('brand').textContent = garajeiro || 'AutoClub';
}

function downloadQR() {
    generateQR();

    const canvas = document.querySelector('#qrcode canvas');
    const link = document.createElement('a');

    link.href = canvas.toDataURL();
    link.download = 'qr-autoclub.png';
    link.click();
}

document.getElementById('url').addEventListener('input', generateQR);
document.getElementById('garajeiro').addEventListener('input', generateQR);
document.getElementById('size').addEventListener('change', generateQR);

generateQR();

</script>

</body>
</html>
